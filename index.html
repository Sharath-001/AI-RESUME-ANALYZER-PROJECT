<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
            transition: 0.3s;
        }

        .dark-mode {
            background: #121212;
            color: white;
        }

        .container {
            max-width: 92%;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .dark-mode .container {
            background: #1e1e1e;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        input[type="file"] {
            padding: 10px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            width: 100%;
        }

        .score {
            font-size: 40px;
            font-weight: bold;
            color: #2ecc71;
        }

        .result-box {
            margin-top: 20px;
            text-align: left;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .dark-mode .result-box {
            background: #2c2c2c;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="top-bar">
        <h2>🚀 AI Resume Analyzer</h2>
        <button onclick="toggleMode()">🌙/☀️</button>
    </div>

    <h4>Built by Sharath</h4>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="resume" required>
        <button type="submit">Analyze Resume</button>
    </form>

    {% if ats_score %}
    <h2>ATS Score</h2>
    <div class="score">{{ ats_score }}/100</div>
    {% endif %}

    {% if result %}
    <div class="result-box">
        <h3>Analysis Result</h3>
        <pre id="report">{{ result }}</pre>
    </div>

    <!-- Download Button -->
    <button onclick="downloadReport()">Download Report 📄</button>
    {% endif %}

</div>

<script>
function toggleMode() {
    document.body.classList.toggle("dark-mode");
}

function downloadReport() {
    let text = document.getElementById("report").innerText;
    let blob = new Blob([text], { type: "text/plain" });
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "resume_analysis.txt";
    link.click();
}
</script>

</body>
</html>
